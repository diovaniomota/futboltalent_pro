workflows:
  ios-workflow:
    name: iOS Workflow
    integrations:
      app_store_connect: codemagic
    environment:
      groups:
        - codemagic
      flutter: default
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: pro.futboltalent.app
    scripts:
      - name: Get packages
        script: |
          flutter packages pub get
      - name: Build iOS
        script: |
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
