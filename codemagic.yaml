workflows:
  ios-workflow:
    name: iOS Workflow
    environment:
      flutter: default
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get packages
        script: |
          flutter packages pub get
      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
