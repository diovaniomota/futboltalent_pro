workflows:
  android-apk-workflow:
    name: Android APK Workflow
    environment:
      flutter: default
    scripts:
      - name: Get packages
        script: |
          flutter packages pub get
      - name: Build Android APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk

  ios-workflow:
    name: iOS Workflow
    integrations:
      app_store_connect: codemagic
    environment:
      groups:
        - codemagic
      flutter: default
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: pro.futboltalent.app
    scripts:
      - name: Get packages
        script: |
          flutter packages pub get
      - name: Validate signing inputs
        script: |
          test -n "$CERTIFICATE_PRIVATE_KEY" || {
            echo "Missing CERTIFICATE_PRIVATE_KEY in the imported Codemagic environment group."
            exit 1
          }
      - name: Initialize keychain
        script: |
          keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles --project ios/Runner.xcodeproj
      - name: Build iOS
        script: |
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
